name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build, test & quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: order-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      # `verify` runs the full pipeline: compile -> unit tests (Surefire) + JaCoCo domain
      # coverage gate (>=80%) -> integration tests (Failsafe, Testcontainers: Postgres + WireMock,
      # reusing wiremock/mappings). Ubuntu runners ship Docker, so Testcontainers works here.
      - name: Build, unit & integration tests (JaCoCo gate)
        run: ./mvnw -B -ntp clean verify

      # Mutation testing on the domain module (MSI >= 75%, enforced by the configured threshold).
      - name: Mutation testing (Pitest)
        run: ./mvnw -B -ntp org.pitest:pitest-maven:mutationCoverage

      - name: Upload test, coverage & mutation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            order-service/target/site/jacoco/
            order-service/target/pit-reports/
            order-service/target/surefire-reports/
            order-service/target/failsafe-reports/
          if-no-files-found: ignore

  security-scan:
    name: Container vulnerability scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build runtime image
        run: docker build -t order-service:${{ github.sha }} order-service

      # Report all HIGH/CRITICAL findings to the GitHub Security tab (does not fail the build).
      - name: Trivy scan (SARIF report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: order-service:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true # tolerate repos without GitHub code scanning; the gate below still enforces
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # Gate: fail the pipeline on fixable CRITICAL vulnerabilities.
      - name: Trivy gate (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: order-service:${{ github.sha }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
