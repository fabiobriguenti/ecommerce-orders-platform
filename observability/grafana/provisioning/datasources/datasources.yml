apiVersion: 1

# Prometheus is the default; Jaeger is wired so traces can be explored from Grafana's Explore view.
# Fixed `uid`s let the provisioned dashboards reference these datasources portably (any clone resolves
# the same uid, so committed dashboard JSON works without manual rebinding).
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Jaeger
    type: jaeger
    uid: jaeger
    access: proxy
    url: http://jaeger:16686
