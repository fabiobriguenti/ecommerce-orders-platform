spring:
  application:
    name: order-service
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/orders}
    username: ${DB_USER:orders}
    password: ${DB_PASSWORD:orders}
  flyway:
    # Flyway runs migrations over JDBC (ADR-06), separate from the reactive R2DBC runtime.
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/orders}
    user: ${DB_USER:orders}
    password: ${DB_PASSWORD:orders}
    locations: classpath:db/migration
    baseline-on-migrate: true

# Base URL of the WireMock-simulated external services.
external:
  base-url: ${EXTERNAL_BASEURL:http://localhost:8081}

# Outbox poller (ADR-04): delivers domain events to the Notification service.
outbox:
  poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:5000}
  batch-size: 50

resilience4j:
  circuitbreaker:
    instances:
      paymentGateway:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      paymentGateway:
        timeout-duration: 3s
        cancel-running-future: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

server:
  port: 8080
