spring:
  application:
    name: order-service
  security:
    oauth2:
      resourceserver:
        jwt:
          # RSA public key used to validate Bearer JWTs (ADR-15). The matching private key signs
          # tokens via the dev-only /api/v1/auth/token endpoint.
          public-key-location: classpath:keys/public.pem
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/orders}
    username: ${DB_USER:orders}
    password: ${DB_PASSWORD:orders}
    # Connection pool to Postgres (r2dbc-pool). Sized for the reactive workload; keep modest — a pool
    # larger than the real concurrency (or than Postgres max_connections) hurts via contention.
    pool:
      initial-size: ${DB_POOL_INITIAL:10}
      max-size: ${DB_POOL_MAX:30}
      max-acquire-time: 5s
      max-idle-time: 30m
  flyway:
    # Flyway runs migrations over JDBC (ADR-06), separate from the reactive R2DBC runtime.
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/orders}
    user: ${DB_USER:orders}
    password: ${DB_PASSWORD:orders}
    locations: classpath:db/migration
    baseline-on-migrate: true

# Application security knobs (ADR-15).
app:
  security:
    jwt:
      issuer: ${JWT_ISSUER:order-service}
    dev-token:
      # Dev-only token minting endpoint. MUST be false in production.
      enabled: ${DEV_TOKEN_ENABLED:true}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${RATE_LIMIT_RPM:120}

# Base URL of the WireMock-simulated external services.
external:
  base-url: ${EXTERNAL_BASEURL:http://localhost:8081}
  # Reactor Netty outbound connection pool shared by the external HTTP clients (Customer, Catalog,
  # Payment, Notification). Defaults override Reactor Netty's own (maxConnections = max(cores, 16)).
  pool:
    max-connections: ${EXTERNAL_POOL_MAX_CONN:200}
    pending-acquire-max-count: ${EXTERNAL_POOL_PENDING_MAX:1000}
    pending-acquire-timeout-ms: 5000
    max-idle-time-ms: 30000
    max-life-time-ms: 300000
    connect-timeout-ms: 2000

# Outbox poller (ADR-04): delivers domain events to the Notification service.
outbox:
  poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:5000}
  batch-size: 50

resilience4j:
  circuitbreaker:
    instances:
      paymentGateway:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      paymentGateway:
        timeout-duration: 3s
        cancel-running-future: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  # Observability (ADR-16). The trace/span ids double as the propagated correlation id and are
  # emitted on every structured log line; CorrelationIdFilter also echoes X-Correlation-Id.
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

# Structured JSON logs (ECS) carrying traceId/spanId from Micrometer tracing.
logging:
  structured:
    format:
      console: ${LOG_FORMAT:ecs}

# OpenAPI 3.1 spec + Swagger UI (Phase 6 API requirement).
springdoc:
  api-docs:
    version: openapi_3_1
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
